<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Todo Card — Stage0</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- A simple centered container so the card looks nice on wide screens -->
    <main class="page-wrap">
      <!-- Root card container: semantic article and required data-testid -->
      <article class="todo-card" data-testid="test-todo-card" aria-labelledby="todo-title" role="region">
        <header class="card-header">
          <div class="complete-wrap">
            <input id="complete-toggle" data-testid="test-todo-complete-toggle" type="checkbox" />
            <label for="complete-toggle">Mark complete</label>
          </div>
          <div class="meta">
            <h2 id="todo-title" data-testid="test-todo-title">TO-DO task card component</h2>
            <!-- Priority indicator (dot) -->
            <span class="priority-indicator" data-testid="test-todo-priority-indicator" aria-label="Priority indicator"></span>
            <span class="badge priority" data-testid="test-todo-priority" aria-label="Priority: High">High</span>
          </div>
        </header>

        <!-- Collapsible description section -->
        <div class="desc-wrap">
          <button class="expand-toggle" data-testid="test-todo-expand-toggle" aria-expanded="false" aria-controls="desc-collapsible" tabindex="0">Expand</button>
          <div class="collapsible-section" id="desc-collapsible" data-testid="test-todo-collapsible-section">
            <p class="description" data-testid="test-todo-description">
              This is my submission for the HNG frontend stage zero task.
            </p>
          </div>
        </div>

        <!-- Tags as a wrapping list of chips -->
        <div class="tags" role="list" data-testid="test-todo-tags" aria-label="Tags">
          <span role="listitem" class="tag" data-testid="test-todo-tag-work">Work</span>
          <span role="listitem" class="tag" data-testid="test-todo-tag-urgent">Urgent</span>
          <span role="listitem" class="tag">Design</span>
        </div>

        <!-- Edit form (hidden by default) -->
        <form class="edit-form" data-testid="test-todo-edit-form" style="display:none" autocomplete="off">
          <div class="form-group">
            <label for="edit-title">Title</label>
            <input id="edit-title" data-testid="test-todo-edit-title-input" type="text" />
          </div>
          <div class="form-group">
            <label for="edit-description">Description</label>
            <textarea id="edit-description" data-testid="test-todo-edit-description-input"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="edit-priority">Priority</label>
              <select id="edit-priority" data-testid="test-todo-edit-priority-select">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
              </select>
            </div>
            <div class="form-group">
              <label for="edit-status">Status</label>
              <select id="edit-status" data-testid="test-todo-status-control" aria-label="Status">
                <option value="Pending">Pending</option>
                <option value="In Progress">In Progress</option>
                <option value="Done">Done</option>
              </select>
            </div>
            <div class="form-group">
              <label for="edit-due-date">Due Date</label>
              <input id="edit-due-date" data-testid="test-todo-edit-due-date-input" type="datetime-local" />
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" data-testid="test-todo-save-button">Save</button>
            <button type="button" data-testid="test-todo-cancel-button">Cancel</button>
          </div>
        </form>

        <footer class="card-footer">
          <div class="left">
            <span class="overdue-indicator" data-testid="test-todo-overdue-indicator" style="display:none">Overdue</span>
            <time class="due" id="due-date" datetime="" data-testid="test-todo-due-date">Due Mar 1, 2026</time>
            <time class="remaining" id="time-remaining" data-testid="test-todo-time-remaining" aria-live="polite">Due in 3 days</time>
          </div>
          <div class="right">
            <span class="badge status" data-testid="test-todo-status" aria-label="Status: Pending">Pending</span>
            <select class="status-control" data-testid="test-todo-status-control" aria-label="Status">
              <option value="Pending">Pending</option>
              <option value="In Progress">In Progress</option>
              <option value="Done">Done</option>
            </select>
            <button class="icon-btn" data-testid="test-todo-edit-button" aria-label="Edit task">Edit</button>
            <button class="icon-btn danger" data-testid="test-todo-delete-button" aria-label="Delete task">Delete</button>
          </div>
        </footer>
      </article>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
